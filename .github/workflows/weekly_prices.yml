name: Weekly Price Checker

on:
  schedule:
    # Runs every Monday at 8 AM
    - cron: '0 8 * * 1'
  workflow_dispatch:  # Lets you run it manually too

jobs:
  check-prices:
    runs-on: ubuntu-latest
    
    steps:
    - name: Get the code
      uses: actions/checkout@v4
    
    - name: Install Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install tools
      run: |
        pip install playwright
        playwright install chromium
    
    - name: Run price checker
      env:
        COLES_EMAIL: ${{ secrets.COLES_EMAIL }}
        COLES_PASSWORD: ${{ secrets.COLES_PASSWORD }}
        WOOLWORTHS_EMAIL: ${{ secrets.WOOLWORTHS_EMAIL }}
        WOOLWORTHS_PASSWORD: ${{ secrets.WOOLWORTHS_PASSWORD }}
      run: python price_tracker.py
    
    - name: Save results
      uses: actions/upload-artifact@v4
      with:
        name: price-results
        path: prices_*.json
